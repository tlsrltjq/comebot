spring.application.name=comebot
spring.config.import=optional:file:.env[.properties]
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:${POSTGRES_PORT:5432}/${POSTGRES_DB:comebot}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:comebot}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:}}
spring.jpa.hibernate.ddl-auto=none
history.storage-type=${HISTORY_STORAGE_TYPE:IN_MEMORY}
market.price-provider=${MARKET_PRICE_PROVIDER:UPBIT}
market.upbit-krw-ticker-polling.enabled=${MARKET_UPBIT_KRW_TICKER_POLLING_ENABLED:true}
market.upbit-krw-ticker-polling.bootstrap-on-startup=${MARKET_UPBIT_KRW_TICKER_POLLING_BOOTSTRAP_ON_STARTUP:true}
market.upbit-krw-ticker-polling.fixed-delay-ms=${MARKET_UPBIT_KRW_TICKER_POLLING_FIXED_DELAY_MS:600000}
paper.initial-cash=${PAPER_INITIAL_CASH:1000000}
paper.portfolio-storage-type=${PAPER_PORTFOLIO_STORAGE_TYPE:IN_MEMORY}
safety.kill-switch-enabled=${SAFETY_KILL_SWITCH_ENABLED:false}
trading.mode=PAPER_TRADING
trading.max-order-amount=${TRADING_MAX_ORDER_AMOUNT:100000}
trading.allowed-markets=${TRADING_ALLOWED_MARKETS:ALL_KRW}
risk.take-profit-rate=${RISK_TAKE_PROFIT_RATE:1.5}
risk.stop-loss-rate=${RISK_STOP_LOSS_RATE:-0.7}
risk.position-exit-enabled=${RISK_POSITION_EXIT_ENABLED:true}
risk.daily-order-limit=${RISK_DAILY_ORDER_LIMIT:10}
risk.daily-loss-limit=${RISK_DAILY_LOSS_LIMIT:50000}
risk.daily-risk-enabled=${RISK_DAILY_RISK_ENABLED:false}
strategy.selected=${STRATEGY_SELECTED:VOLATILITY_BREAKOUT_LONG}
strategy.simple-threshold.buy-price=${STRATEGY_BUY_PRICE:90000000}
strategy.simple-threshold.sell-price=${STRATEGY_SELL_PRICE:110000000}
strategy.simple-threshold.order-quantity=${STRATEGY_ORDER_QUANTITY:0.01}
strategy.simple-threshold.order-amount=${STRATEGY_ORDER_AMOUNT:10000}
strategy.candidate-scanner.candle-unit-minutes=${STRATEGY_CANDIDATE_CANDLE_UNIT_MINUTES:1}
strategy.candidate-scanner.candle-count=${STRATEGY_CANDIDATE_CANDLE_COUNT:5}
strategy.candidate-scanner.min-price-change-rate=${STRATEGY_CANDIDATE_MIN_PRICE_CHANGE_RATE:0.3}
strategy.candidate-scanner.min-trade-amount-change-rate=${STRATEGY_CANDIDATE_MIN_TRADE_AMOUNT_CHANGE_RATE:20}
strategy.candidate-scanner.max-price-change-rate=${STRATEGY_CANDIDATE_MAX_PRICE_CHANGE_RATE:10}
strategy.candidate-scanner.max-high-low-range-rate=${STRATEGY_CANDIDATE_MAX_HIGH_LOW_RANGE_RATE:20}
strategy.entry.prevent-reentry-with-position=${STRATEGY_ENTRY_PREVENT_REENTRY_WITH_POSITION:false}
trading.scheduler.enabled=${TRADING_SCHEDULER_ENABLED:false}
trading.scheduler.fixed-delay-ms=${TRADING_SCHEDULER_FIXED_DELAY_MS:30000}
trading.scheduler.markets=${TRADING_SCHEDULER_MARKETS:ALL_KRW}
trading.candidate-scheduler.enabled=${TRADING_CANDIDATE_SCHEDULER_ENABLED:true}
trading.candidate-scheduler.fixed-delay-ms=${TRADING_CANDIDATE_SCHEDULER_FIXED_DELAY_MS:60000}
trading.candidate-scheduler.markets=${TRADING_CANDIDATE_SCHEDULER_MARKETS:ALL_KRW}
trading.candidate-scheduler.notify-summary=${TRADING_CANDIDATE_SCHEDULER_NOTIFY_SUMMARY:false}
trading.exit-scheduler.enabled=${TRADING_EXIT_SCHEDULER_ENABLED:true}
trading.exit-scheduler.fixed-delay-ms=${TRADING_EXIT_SCHEDULER_FIXED_DELAY_MS:5000}
trading.exit-scheduler.per-market-delay-ms=${TRADING_EXIT_SCHEDULER_PER_MARKET_DELAY_MS:0}
trading.exit-scheduler.save-hold-history=${TRADING_EXIT_SCHEDULER_SAVE_HOLD_HISTORY:false}
trading.exit-scheduler.exchange=${TRADING_EXIT_SCHEDULER_EXCHANGE:UPBIT}
notification.enabled=${NOTIFICATION_ENABLED:false}
notification.send-hold=${NOTIFICATION_SEND_HOLD:false}
notification.send-filled=${NOTIFICATION_SEND_FILLED:true}
notification.send-rejected=${NOTIFICATION_SEND_REJECTED:true}
telegram.enabled=${TELEGRAM_ENABLED:false}
telegram.bot-token=${TELEGRAM_BOT_TOKEN:}
telegram.chat-id=${TELEGRAM_CHAT_ID:}
telegram.inbound.enabled=${TELEGRAM_INBOUND_ENABLED:false}
telegram.inbound.fixed-delay-ms=${TELEGRAM_INBOUND_FIXED_DELAY_MS:3000}
telegram.inbound.manual-paper-execution-enabled=${TELEGRAM_MANUAL_PAPER_EXECUTION_ENABLED:false}
telegram.inbound.offset-storage-type=${TELEGRAM_INBOUND_OFFSET_STORAGE_TYPE:IN_MEMORY}
