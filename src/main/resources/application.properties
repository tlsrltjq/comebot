spring.application.name=comebot
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:${POSTGRES_PORT:5432}/${POSTGRES_DB:comebot}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:comebot}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:1234}}
spring.jpa.hibernate.ddl-auto=none
history.storage-type=${HISTORY_STORAGE_TYPE:IN_MEMORY}
market.price-provider=${MARKET_PRICE_PROVIDER:IN_MEMORY}
trading.mode=PAPER_TRADING
trading.max-order-amount=100000
trading.allowed-markets=KRW-BTC,KRW-ETH
strategy.simple-threshold.buy-price=90000000
strategy.simple-threshold.sell-price=110000000
strategy.simple-threshold.order-quantity=0.001
trading.scheduler.enabled=false
trading.scheduler.fixed-delay-ms=60000
trading.scheduler.markets=KRW-BTC,KRW-ETH
notification.enabled=false
notification.send-hold=false
notification.send-filled=true
notification.send-rejected=true
telegram.enabled=false
telegram.bot-token=${TELEGRAM_BOT_TOKEN:}
telegram.chat-id=${TELEGRAM_CHAT_ID:}
telegram.inbound.enabled=${TELEGRAM_INBOUND_ENABLED:false}
telegram.inbound.fixed-delay-ms=${TELEGRAM_INBOUND_FIXED_DELAY_MS:3000}
